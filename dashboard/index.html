<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Env Guardian — Admin Console</title>
<meta name="description" content="Env Guardian MDM admin console — devices, policies, QR, compliance & metrics." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%234f6ef7'/%3E%3Cstop offset='1' stop-color='%2314b8a6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath fill='url(%23g)' d='M24 3 6 10v13c0 11.5 7.7 19.4 18 22 10.3-2.6 18-10.5 18-22V10L24 3z'/%3E%3Cpath fill='%23fff' d='m21.2 29.8-5.4-5.4 2.5-2.5 2.9 2.9 8.5-8.5 2.5 2.5-11 11z'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/style.css" />
</head>
<body>

<!-- animated aurora background -->
<div class="bg"></div>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>
<div class="grain"></div>
<div class="progress" id="progress"></div>

<!-- ═══════════ LOGIN ═══════════ -->
<div class="login-wrap" id="loginView">
  <form class="login-card glass" id="loginForm" autocomplete="on">
    <div class="login-brand">
      <svg viewBox="0 0 48 48" aria-hidden="true">
        <defs><linearGradient id="lg1" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#4f6ef7"/><stop offset="1" stop-color="#14b8a6"/>
        </linearGradient></defs>
        <path fill="url(#lg1)" d="M24 3 6 10v13c0 11.5 7.7 19.4 18 22 10.3-2.6 18-10.5 18-22V10L24 3z"/>
        <path fill="#fff" d="m21.2 29.8-5.4-5.4 2.5-2.5 2.9 2.9 8.5-8.5 2.5 2.5-11 11z"/>
      </svg>
      <h1>Env Guardian</h1>
      <p>Admin Console — Zero-Trust BYOD Management</p>
    </div>

    <p class="login-err" id="loginErr"></p>

    <div class="field">
      <label for="fOrg">Organisation</label>
      <input class="input" id="fOrg" placeholder="Env Guardian" value="Env Guardian" autocomplete="organization" />
    </div>
    <div class="field">
      <label for="fUser">Username</label>
      <input class="input" id="fUser" placeholder="username" required autocomplete="username" />
    </div>
    <div class="field">
      <label for="fPass">Password</label>
      <input class="input" id="fPass" type="password" placeholder="••••••••" required autocomplete="current-password" />
    </div>

    <button class="btn btn-primary" style="width:100%;padding:13px" type="submit" id="loginBtn">
      Sign in securely
    </button>

    <details class="login-adv">
      <summary>Server connection</summary>
      <div class="field" style="margin-top:12px;text-align:left">
        <label for="fApi">API base URL</label>
        <input class="input" id="fApi" placeholder="https://your-server.onrender.com" />
      </div>
    </details>

    <div class="login-roles">
      <span class="badge role-admin">Admin · full control</span>
      <span class="badge role-manager">Manager · operate</span>
      <span class="badge role-viewer">Viewer · read-only</span>
    </div>
  </form>
</div>

<!-- ═══════════ SHELL ═══════════ -->
<div class="shell" id="shell">
  <div class="side-scrim" id="scrim"></div>
  <aside class="side" id="sidebar">
    <div class="side-brand">
      <svg viewBox="0 0 48 48" aria-hidden="true">
        <defs><linearGradient id="lg2" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#4f6ef7"/><stop offset="1" stop-color="#14b8a6"/>
        </linearGradient></defs>
        <path fill="url(#lg2)" d="M24 3 6 10v13c0 11.5 7.7 19.4 18 22 10.3-2.6 18-10.5 18-22V10L24 3z"/>
        <path fill="#fff" d="m21.2 29.8-5.4-5.4 2.5-2.5 2.9 2.9 8.5-8.5 2.5 2.5-11 11z"/>
      </svg>
      <div>Env Guardian<small>Admin Console</small></div>
    </div>
    <nav id="nav"></nav>
    <div class="side-foot">
      <div class="side-user">
        <div class="avatar" id="uAvatar">–</div>
        <div class="who"><b id="uName">–</b><span id="uRole">–</span></div>
        <button class="logout" id="logoutBtn" title="Sign out" aria-label="Sign out">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar glass">
      <button class="btn btn-ghost btn-icon menu-btn" id="menuBtn" aria-label="Menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h2><span class="crumb">Env Guardian /</span><span id="pageTitle">Overview</span></h2>
      <span class="live-dot" id="liveDot"><i></i>Live</span>
      <button class="btn btn-ghost btn-sm" id="refreshBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>
        Refresh
      </button>
    </div>
    <div id="view"></div>
  </div>
</div>

<!-- modal + tooltip + toasts -->
<div class="modal-bg" id="modalBg"><div class="modal glass" id="modalBox"></div></div>
<div class="viz-tip" id="vizTip"></div>
<div class="toasts" id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script src="assets/config.js"></script>
<script src="assets/charts.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
