# Render deployment descriptor for the Env Guardian backend.
# Create a "Blueprint" on Render pointing at this repo, or use as reference
# when configuring the service manually.
services:
  - type: web
    name: envguardian-server
    runtime: node
    plan: free
    # npm ci wipes node_modules and installs exactly from package-lock.json —
    # avoids the partial/corrupt node_modules that a stale build cache can cause.
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Set these as secrets in the Render dashboard (sync:false = not in repo):
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Optional: the deployed dashboard origin(s)
      - key: CORS_ORIGINS
        sync: false
